name: Test dummy token does not override user .npmrc

on:
  workflow_dispatch:

jobs:
  dummy-does-not-override:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Create project .npmrc
        run: |
            cat > .npmrc <<'EOF'
            registry=https://registry.npmjs.org/ //registry.npmjs.org/:_authToken=${NPM_TOKEN_TEST}  EOF

      - name: Setup Node with registry-url 
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org/'
          
          

      - run: npm publish
        env:
            NPM_TOKEN_TEST : ${{ secrets.NPM_TOKEN }} # from users .npmrc

   
