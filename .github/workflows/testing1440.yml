name: TestRemoveDummyToken

on:
  workflow_dispatch:

jobs:
  no-token-fails:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Setup Node with registry-url 
        uses: actions/setup-node@v6
        with:
          node-version: '14'
          registry-url: 'https://registry.npmjs.org'


      - run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
